name: Release Please

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # 1. Maintain the release PR. If a release commit was just merged, this also
  #    creates the GitHub Release + the v* tag and signals downstream via outputs.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file:   release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: master

  # 2. Only runs when release-please actually cut a release on this push.
  #    Builds, tests, packs, and pushes to NuGet.org.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags:  true
          ref:         ${{ needs.release-please.outputs.tag_name }}

      - name: Show resolved version (diagnostic)
        run: |
          echo "Tag we built:"
          echo "  ${{ needs.release-please.outputs.tag_name }}"
          echo "git describe:"
          git describe --tags --always --long

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore -p:MinVerVerbosity=detailed

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        run: dotnet pack -c Release --no-build -o artifacts -p:MinVerVerbosity=detailed

      - name: Refuse to publish a no-tag fallback
        run: |
          if ls artifacts/*0.0.0-alpha.0.*.nupkg 2>/dev/null; then
            echo "::error::MinVer produced a no-tag fallback version. Aborting before push."
            exit 1
          fi

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "artifacts/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
