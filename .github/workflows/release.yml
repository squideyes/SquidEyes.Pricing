name: Release

on:
  push:
    tags: ["v*"]

# Opt in to Node 24 for all JS actions before it becomes the default (June 2026).
# Silences the "Node.js 20 actions are deprecated" warning. Can drop once the
# referenced actions ship native Node 24 versions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true     # MinVer needs the annotated tag itself, not just history

      - name: Show resolved version (diagnostic)
        run: |
          echo "Tags in checkout:"
          git tag
          echo "git describe:"
          git describe --tags --always --long

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      # Verbose MinVer logging so we can see exactly what version it resolved and why.
      - name: Build
        run: dotnet build -c Release --no-restore -p:MinVerVerbosity=detailed

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        run: dotnet pack -c Release --no-build -o artifacts -p:MinVerVerbosity=detailed

      # Hard-fail if MinVer fell back to its 0.0.0-alpha.0 placeholder — better to
      # abort than to publish another ghost version to NuGet.org.
      - name: Refuse to publish a no-tag fallback
        run: |
          if ls artifacts/*0.0.0-alpha.0.*.nupkg 2>/dev/null; then
            echo "::error::MinVer produced a no-tag fallback version. Aborting before push."
            exit 1
          fi

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        # `dotnet nuget push *.nupkg` automatically discovers and pushes the matching
        # *.snupkg next to it, so a separate snupkg push line would conflict.
        run: |
          dotnet nuget push "artifacts/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
