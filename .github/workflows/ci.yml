name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Opt in to Node 24 for all JS actions before it becomes the default (June 2026).
# Silences the "Node.js 20 actions are deprecated" warning emitted by checkout, setup-dotnet,
# upload-artifact, etc. Can drop this block once those actions ship native Node 24 versions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0       # MinVer needs full history + tags
          fetch-tags: true     # tag-triggered runs sometimes miss the annotated tag without this

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --logger "trx;LogFileName=tests.trx"

      - name: Pack
        run: dotnet pack -c Release --no-build -o artifacts

      - name: Upload nupkgs
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: artifacts/*.*nupkg
          if-no-files-found: error
